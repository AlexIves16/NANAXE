name: nanaxe_crm
description: CRM-assistant for freelancers and teams with AI planning and mind maps
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.5

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0
  firebase_messaging: ^14.9.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Local Storage (Offline cache)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Google Calendar
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  table_calendar: ^3.0.9

  # AI Services
  http: ^1.2.0
  dio: ^5.4.0

  # UI Components
  cupertino_icons: ^1.0.8
  flutter_staggered_grid_view: ^0.7.0
  syncfusion_flutter_gauges: ^25.1.38
  graphview: ^1.2.0
  flutter_mind_map: ^1.0.23

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.4
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  flutter_dotenv: ^5.1.0
  
  # Notifications & Alarms
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # Navigation
  go_router: ^13.1.0
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - .env
